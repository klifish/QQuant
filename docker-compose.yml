services:
  qquant:
    build: .
    image: qquant:latest
    # TUSHARE_TOKEN 等从 .env 注入为环境变量（.env 留在宿主机，不进镜像）
    env_file: .env
    environment:
      # 让容器内 datetime.now() 也按北京时间，确保报告日期正确
      - TZ=Asia/Shanghai
    volumes:
      # bind mount：DB / 报告 / 日志全部落在宿主机 ./data 等目录，
      # 容器重建或代码更新都不影响这些数据
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    # 无 ports、无 restart：这是按需运行的批处理服务，
    # 调用方式为 docker compose run --rm qquant python scripts/xxx.py

  # 长驻监控面板：只监听本地回环，配合 SSH 隧道访问（公网访问不到）
  # 复用 qquant 服务构建出的 qquant:latest 镜像
  dashboard:
    image: qquant:latest
    command: >
      streamlit run dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --browser.gatherUsageStats false
    env_file: .env
    environment:
      - TZ=Asia/Shanghai
    ports:
      # 关键：绑定 127.0.0.1，仅服务器本地可达，不对公网开放
      - "127.0.0.1:8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./reports:/app/reports:ro
      - ./logs:/app/logs:ro
    restart: unless-stopped
