name: Build & Deploy

# 打 v* tag 或手动触发：在 GitHub Actions 上构建镜像并推送到阿里云 ACR，
# 再 SSH 到服务器 pull 启用。服务器无需本地构建。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── 测试闸门 ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        env:
          TUSHARE_TOKEN: "ci-placeholder-token"

  # ── 在 runner 上构建镜像并推送到阿里云 ACR ────────────────
  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.ACR_REGISTRY }}/${{ vars.ACR_NAMESPACE }}/${{ vars.ACR_REPO }}:latest

  # ── 服务器拉取新镜像（需 server 环境批准）─────────────────
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: server
    steps:
      - name: SSH 到服务器拉取并启用新镜像
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ vars.SERVER_PORT }}
          script: |
            set -euo pipefail
            cd /opt/qquant

            echo ">>> 更新部署脚本 / compose（不含镜像）"
            git fetch origin
            git checkout --force "${{ github.ref_name }}"

            echo ">>> 登录 ACR 并拉取最新镜像"
            echo "${{ secrets.ACR_PASSWORD }}" \
              | docker login ${{ vars.ACR_REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin
            docker compose pull

            echo ">>> 冒烟验证（不依赖数据库）"
            docker compose run --rm qquant \
              python -c "from src.config import load_config; load_config(); print('config OK')"

            chmod +x /opt/qquant/deploy/*.sh
            echo ">>> 部署完成，下次 cron 即用新镜像"
